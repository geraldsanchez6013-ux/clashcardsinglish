<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Anki Ultra Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@600;700&display=swap');

        *{margin:0;padding:0;box-sizing:border-box}
        
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
            min-height:100vh;
            padding:20px;
            overflow-x:hidden
        }
        
        .container{max-width:1600px;margin:0 auto}
        
        .header{
            background:rgba(15,12,41,.85);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:30px;
            margin-bottom:25px;
            box-shadow:0 20px 60px rgba(0,212,255,.1);
            display:flex;
            justify-content:space-between;
            align-items:center;
            border:1px solid rgba(0,212,255,.2)
        }
        
        .header h1{
            color:#00d4ff;
            font-size:32px;
            font-family:'Space Grotesk',sans-serif;
            font-weight:700;
            letter-spacing:-1px
        }
        
        .header-tabs{display:flex;gap:12px}
        
        .tab-btn{
            padding:12px 24px;
            background:rgba(48,43,99,.4);
            border:2px solid rgba(0,212,255,.2);
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            font-size:13px;
            transition:all .3s cubic-bezier(.4,0,.2,1);
            color:#00d4ff;
            text-transform:uppercase;
            letter-spacing:.5px
        }
        
        .tab-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(0,212,255,.2)
        }
        
        .tab-btn.active{
            background:linear-gradient(135deg,#7b2cbf,#00d4ff);
            color:white;
            border-color:transparent;
            box-shadow:0 10px 30px rgba(123,44,191,.4)
        }
        
        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
            gap:18px;
            margin-bottom:25px
        }
        
        .stat-card{
            background:rgba(48,43,99,.4);
            backdrop-filter:blur(10px);
            padding:24px;
            border-radius:16px;
            text-align:center;
            box-shadow:0 10px 40px rgba(0,212,255,.1);
            border:1px solid rgba(0,212,255,.2);
            transition:all .4s cubic-bezier(.4,0,.2,1)
        }
        
        .stat-card:hover{
            transform:translateY(-8px);
            box-shadow:0 20px 60px rgba(123,44,191,.25)
        }
        
        .stat-value{
            font-size:36px;
            font-weight:700;
            background:linear-gradient(135deg,#00d4ff,#7b2cbf);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            font-family:'Space Grotesk',sans-serif
        }
        
        .stat-label{
            font-size:11px;
            color:#999;
            margin-top:8px;
            text-transform:uppercase;
            letter-spacing:1px;
            font-weight:600
        }
        
        .main-layout{
            display:grid;
            grid-template-columns:320px 1fr;
            gap:25px;
            margin-bottom:25px
        }
        
        .sidebar{
            background:rgba(255,255,255,.95);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 40px rgba(0,0,0,.1);
            border:1px solid rgba(255,255,255,.5);
            height:fit-content;
            max-height:85vh;
            overflow-y:auto
        }
        
        .sidebar h3{
            color:#333;
            font-size:13px;
            margin-bottom:15px;
            text-transform:uppercase;
            letter-spacing:1.2px;
            font-weight:700;
            color:#667eea
        }
        
        .search-input{
            width:100%;
            padding:14px 16px;
            border:2px solid #e8eef7;
            border-radius:12px;
            margin-bottom:20px;
            font-size:14px;
            transition:all .3s;
            font-family:'Inter',sans-serif;
            background:white
        }
        
        .search-input:focus{
            outline:0;
            border-color:#667eea;
            box-shadow:0 0 0 4px rgba(102,126,234,.1)
        }
        
        .category-filters{
            display:flex;
            flex-direction:column;
            gap:8px;
            margin-bottom:20px;
            max-height:220px;
            overflow-y:auto
        }
        
        .category-btn{
            padding:10px 14px;
            border:1.5px solid #e8eef7;
            background:white;
            border-radius:10px;
            cursor:pointer;
            font-size:12px;
            transition:all .3s cubic-bezier(.4,0,.2,1);
            text-align:left;
            font-weight:500;
            color:#666
        }
        
        .category-btn:hover{
            border-color:#667eea;
            color:#667eea;
            background:#f9fafd
        }
        
        .category-btn.active{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            border-color:transparent;
            box-shadow:0 4px 12px rgba(102,126,234,.3)
        }
        
        .mode-buttons{display:flex;flex-direction:column;gap:10px;margin-top:20px}
        
        .mode-btn{
            padding:13px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            font-size:12px;
            transition:all .3s cubic-bezier(.4,0,.2,1);
            text-transform:uppercase;
            letter-spacing:.5px;
            font-family:'Inter',sans-serif
        }
        
        .mode-btn.primary{
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            box-shadow:0 8px 25px rgba(102,126,234,.3)
        }
        
        .mode-btn.primary:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 35px rgba(102,126,234,.4)
        }
        
        .mode-btn.secondary{
            background:#f5f7fa;
            color:#667eea;
            border:1.5px solid #e8eef7;
            transition:all .3s
        }
        
        .mode-btn.secondary:hover{
            border-color:#667eea;
            background:#f9fafd;
            transform:translateY(-2px)
        }
        
        .content{
            background:rgba(255,255,255,.95);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:35px;
            box-shadow:0 10px 40px rgba(0,0,0,.1);
            border:1px solid rgba(255,255,255,.5)
        }
        
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn .5s ease-in}
        
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        
        .study-mode{display:flex;flex-direction:column;gap:25px}
        
        .progress-bar{
            width:100%;
            height:8px;
            background:#e8eef7;
            border-radius:10px;
            overflow:hidden;
            margin-bottom:20px
        }
        
        .progress-fill{
            height:100%;
            background:linear-gradient(90deg,#667eea,#764ba2,#f093fb);
            transition:width .4s cubic-bezier(.4,0,.2,1);
            box-shadow:0 0 20px rgba(102,126,234,.4)
        }
        
        .flashcard{
            background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
            color:white;
            padding:60px 40px;
            border-radius:24px;
            min-height:420px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            cursor:pointer;
            transition:all .5s cubic-bezier(.4,0,.2,1);
            perspective:1000px;
            box-shadow:0 25px 60px rgba(102,126,234,.3),inset 0 1px 0 rgba(255,255,255,.2);
            border:1px solid rgba(255,255,255,.1);
            position:relative;
            overflow:hidden
        }
        
        .flashcard::before{
            content:'';
            position:absolute;
            top:-50%;
            right:-50%;
            width:200%;
            height:200%;
            background:radial-gradient(circle,rgba(255,255,255,.1),transparent);
            animation:shimmer 3s infinite
        }
        
        @keyframes shimmer{
            0%{transform:translate(-100%,-100%)}
            100%{transform:translate(100%,100%)}
        }
        
        .flashcard:hover{
            transform:translateY(-10px) scale(1.02);
            box-shadow:0 35px 80px rgba(102,126,234,.4),inset 0 1px 0 rgba(255,255,255,.3)
        }
        
        .card-word{
            font-size:64px;
            font-weight:700;
            letter-spacing:-2px;
            margin-bottom:25px;
            font-family:'Space Grotesk',sans-serif;
            animation:slideUp .5s ease-out
        }
        
        @keyframes slideUp{
            from{opacity:0;transform:translateY(30px)}
            to{opacity:1;transform:translateY(0)}
        }
        
        .card-category{
            font-size:12px;
            opacity:.85;
            text-transform:uppercase;
            letter-spacing:1.5px;
            margin-bottom:20px;
            font-weight:600;
            background:rgba(255,255,255,.15);
            padding:8px 16px;
            border-radius:8px;
            display:inline-block;
            backdrop-filter:blur(10px)
        }
        
        .flip-hint{
            font-size:12px;
            opacity:.7;
            margin-top:auto;
            font-weight:500;
            letter-spacing:.5px
        }
        
        .card-translation{
            font-size:32px;
            font-weight:700;
            margin-bottom:25px;
            animation:slideUp .5s ease-out
        }
        
        .controls{
            display:flex;
            gap:12px;
            justify-content:center;
            flex-wrap:wrap
        }
        
        .btn{
            padding:13px 22px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            font-size:12px;
            text-transform:uppercase;
            transition:all .3s cubic-bezier(.4,0,.2,1);
            letter-spacing:.5px;
            font-family:'Inter',sans-serif;
            box-shadow:0 6px 20px rgba(0,0,0,.12)
        }
        
        .btn:hover{
            transform:translateY(-4px);
            box-shadow:0 10px 30px rgba(0,0,0,.2)
        }
        
        .btn:active{
            transform:translateY(-2px)
        }
        
        .btn-again{
            background:linear-gradient(135deg,#ff6b6b,#ff5252);
            color:white
        }
        
        .btn-hard{
            background:linear-gradient(135deg,#ffa94d,#ff922b);
            color:white
        }
        
        .btn-good{
            background:linear-gradient(135deg,#51cf66,#40c057);
            color:white
        }
        
        .btn-easy{
            background:linear-gradient(135deg,#4ecdc4,#38ada9);
            color:white
        }
        
        .btn-aleatorio{
            background:linear-gradient(135deg,#9c27b0,#7b1fa2);
            color:white
        }
        
        .navigation{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:25px;
            padding-top:20px;
            border-top:1px solid #e8eef7
        }
        
        .nav-btn{
            padding:11px 20px;
            background:#f5f7fa;
            border:1.5px solid #e8eef7;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            color:#667eea;
            transition:all .3s cubic-bezier(.4,0,.2,1);
            font-size:12px;
            text-transform:uppercase;
            letter-spacing:.5px
        }
        
        .nav-btn:hover:not(:disabled){
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            border-color:transparent;
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(102,126,234,.3)
        }
        
        .nav-btn:disabled{
            opacity:.4;
            cursor:not-allowed
        }
        
        .progressText{
            color:#667eea;
            font-size:13px;
            font-weight:600;
            letter-spacing:.5px
        }
        
        .list-mode{
            max-height:600px;
            overflow-y:auto
        }
        
        .word-item{
            display:flex;
            justify-content:space-between;
            padding:15px;
            border-bottom:1px solid #e8eef7;
            cursor:pointer;
            transition:all .3s cubic-bezier(.4,0,.2,1);
            border-radius:10px;
            margin-bottom:8px
        }
        
        .word-item:hover{
            background:linear-gradient(135deg,#f9fafd,#f5f7fa);
            padding-left:20px;
            box-shadow:0 4px 12px rgba(102,126,234,.1)
        }
        
        .word-name{
            font-weight:700;
            color:#333;
            font-size:14px
        }
        
        .word-trans{
            color:#999;
            font-size:12px;
            margin-top:4px
        }
        
        .stats-advanced{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:18px;
            margin-bottom:25px
        }
        
        .advanced-stat{
            background:linear-gradient(135deg,rgba(102,126,234,.05),rgba(118,75,162,.05));
            padding:20px;
            border-radius:16px;
            border-left:4px solid;
            border-image:linear-gradient(135deg,#667eea,#764ba2) 1;
            transition:all .3s cubic-bezier(.4,0,.2,1)
        }
        
        .advanced-stat:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 30px rgba(102,126,234,.15)
        }
        
        .advanced-stat-value{
            font-size:28px;
            font-weight:700;
            background:linear-gradient(135deg,#667eea,#764ba2);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            font-family:'Space Grotesk',sans-serif
        }
        
        .advanced-stat-label{
            font-size:12px;
            color:#999;
            margin-top:8px;
            text-transform:uppercase;
            letter-spacing:.5px;
            font-weight:600
        }
        
        .category-breakdown{
            background:#f9fafd;
            padding:20px;
            border-radius:16px;
            margin-top:20px;
            max-height:400px;
            overflow-y:auto;
            border:1px solid #e8eef7
        }
        
        .category-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 0;
            border-bottom:1px solid #e8eef7;
            transition:all .2s
        }
        
        .category-row:hover{
            background:#ffffff;
            padding:12px 8px;
            border-radius:8px
        }
        
        .category-row:last-child{border-bottom:none}
        
        .category-name{
            font-weight:700;
            color:#333;
            min-width:150px;
            font-size:13px
        }
        
        .category-stats{
            display:flex;
            gap:20px;
            font-size:12px;
            color:#999
        }
        
        .chart-container{
            position:relative;
            height:300px;
            margin-bottom:30px
        }
        
        @media (max-width:768px){
            .main-layout{grid-template-columns:1fr}
            .sidebar{max-height:none}
            .flashcard{min-height:300px;padding:40px 25px}
            .card-word{font-size:48px}
            .header{flex-direction:column;gap:20px}
            .header h1{font-size:24px}
        }
        
        ::-webkit-scrollbar{width:8px}
        ::-webkit-scrollbar-track{background:#f5f7fa;border-radius:10px}
        ::-webkit-scrollbar-thumb{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px}
        ::-webkit-scrollbar-thumb:hover{background:linear-gradient(135deg,#5568d3,#6a3f91)}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Wave of Words</h1>
            <div class="header-tabs">
                <button class="tab-btn active" onclick="switchTab('study')">📚 Estudio</button>
                <button class="tab-btn" onclick="switchTab('stats')">📊 Estadísticas</button>
                <button class="tab-btn" onclick="switchTab('progress')">📈 Progreso</button>
            </div>
        </div>

        <!-- TAB: STUDY -->
        <div id="study" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">846</div>
                    <div class="stat-label">📚 Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="correctCount">0</div>
                    <div class="stat-label">✅ Aprendidas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="accuracyPercent">0%</div>
                    <div class="stat-label">🎯 Precisión</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sessionCount">0</div>
                    <div class="stat-label">⚡ Sesión</div>
                </div>
            </div>

            <div class="main-layout">
                <div class="sidebar">
                    <h3>🔍 Filtros</h3>
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar palabra..." autocomplete="off">
                    
                    <h3 style="margin-top:22px">📂 Categorías</h3>
                    <div class="category-filters" id="categoryFilters"></div>

                    <div style="margin-top:22px">
                        <h3>🎮 Modo</h3>
                        <div class="mode-buttons">
                            <button class="mode-btn primary" onclick="setStudyMode()">▶ Estudio</button>
                            <button class="mode-btn secondary" onclick="setListMode()">📋 Lista</button>
                            <button class="mode-btn secondary" onclick="resetProgress()">🔄 Reiniciar</button>
                        </div>
                    </div>
                </div>

                <div class="content">
                    <div id="studyMode" class="study-mode">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>

                        <div class="flashcard" id="mainCard" onclick="flipCard()">
                            <div id="cardFront">
                                <div class="card-category" id="cardCategory"></div>
                                <div class="card-word" id="cardWord"></div>
                                <div class="flip-hint">💡 Haz clic para voltear</div>
                            </div>
                            <div id="cardBack" style="display:none">
                                <div class="card-translation" id="cardTranslation"></div>
                            </div>
                        </div>

                        <div class="controls">
                            <button class="btn btn-again" onclick="markCard('again')">🔴 Otra Vez</button>
                            <button class="btn btn-hard" onclick="markCard('hard')">🟠 Difícil</button>
                            <button class="btn btn-good" onclick="markCard('good')">🟢 Bien</button>
                            <button class="btn btn-easy" onclick="markCard('easy')">🔵 Fácil</button>
                            <button class="btn btn-aleatorio" onclick="shuffleCards()">🔀 Aleatorio</button>
                        </div>

                        <div class="navigation">
                            <button class="nav-btn" id="prevBtn" onclick="previousCard()">⬅ Anterior</button>
                            <span class="progressText" id="progressText"></span>
                            <button class="nav-btn" id="nextBtn" onclick="nextCard()">Siguiente ➜</button>
                        </div>
                    </div>

                    <div id="listMode" style="display:none">
                        <div class="list-mode" id="wordList"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: STATISTICS -->
        <div id="stats" class="tab-content">
            <h2 style="margin-bottom:25px;color:white;font-size:28px;font-family:'Space Grotesk',sans-serif;font-weight:700">📊 Estadísticas Detalladas</h2>
            <div class="stats-advanced">
                <div class="advanced-stat">
                    <div class="advanced-stat-value" id="totalWords">0</div>
                    <div class="advanced-stat-label">📚 Palabras estudiadas</div>
                </div>
                <div class="advanced-stat">
                    <div class="advanced-stat-value" id="correctWords">0</div>
                    <div class="advanced-stat-label">✅ Respuestas correctas</div>
                </div>
                <div class="advanced-stat">
                    <div class="advanced-stat-value" id="accuracy">0%</div>
                    <div class="advanced-stat-label">🎯 Tasa de acierto</div>
                </div>
                <div class="advanced-stat">
                    <div class="advanced-stat-value" id="masteryRate">0%</div>
                    <div class="advanced-stat-label">👑 Dominio general</div>
                </div>
            </div>

            <div style="background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-radius:20px;padding:25px;border:1px solid rgba(255,255,255,.5)">
                <h3 style="margin-bottom:20px;color:#333;font-size:16px;font-weight:700">📈 Desglose por Categoría</h3>
                <div class="category-breakdown" id="categoryStats"></div>
            </div>
        </div>

        <!-- TAB: PROGRESS -->
        <div id="progress" class="tab-content">
            <h2 style="margin-bottom:25px;color:white;font-size:28px;font-family:'Space Grotesk',sans-serif;font-weight:700">📈 Gráfico de Progreso</h2>
            <div style="background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-radius:20px;padding:30px;border:1px solid rgba(255,255,255,.5)">
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
        </div>
    </div>

o",category:"Sustantivo"},{word:"instead",trans:"en lugar",category:"Preposición"},{word:"jacket",trans:"chaqueta",category:"Sustantivo"},{word:"leg",trans:"pierna",category:"Sustantivo"},{word:"metal",trans:"metal",category:"Sustantivo"},{word:"opposite",trans:"opuesto",category:"Adjetivo"},{word:"pound",trans:"libra",category:"Sustantivo"},{word:"roll",trans:"rodar",category:"Verbo"},{word:"score",trans:"puntuación",category:"Sustantivo"},{word:"shoot",trans:"disparar",category:"Verbo"},{word:"speech",trans:"habla",category:"Sustantivo"},{word:"toilet",trans:"baño",category:"Sustantivo"},{word:"whose",trans:"cuyo",category:"Pronombre"},{word:"attitude",trans:"actitud",category:"Sustantivo"},{word:"brave",trans:"valiente",category:"Adjetivo"},{word:"contain",trans:"contiene",category:"Verbo"},{word:"doubt",trans:"duda",category:"Sustantivo"},{word:"experience",trans:"experiencia",category:"Sustantivo"},{word:"flat",trans:"plano",category:"Adjetivo"},{word:"guard",trans:"guardia",category:"Sustantivo"},{word:"heavy",trans:"pesado",category:"Adjetivo"},{word:"charge",trans:"cargar",category:"Verbo"},{word:"iron",trans:"hierro",category:"Sustantivo"},{word:"medicine",trans:"medicamento",category:"Sustantivo"},{word:"noise",trans:"ruido",category:"Sustantivo"},{word:"politics",trans:"política",category:"Sustantivo"},{word:"pour",trans:"verter",category:"Verbo"},{word:"rush",trans:"prisa",category:"Sustantivo"},{word:"smooth",trans:"suave",category:"Adjetivo"},{word:"spread",trans:"propagar",category:"Verbo"},{word:"suggest",trans:"sugerir",category:"Verbo"},{word:"trouble",trans:"problema",category:"Sustantivo"},{word:"west",trans:"oeste",category:"Sustantivo"},{word:"average",trans:"promedio",category:"Sustantivo"},{word:"belong",trans:"pertenecer",category:"Verbo"},{word:"certainly",trans:"ciertamente",category:"Adverbio"},{word:"crime",trans:"crimen",category:"Sustantivo"},{word:"duty",trans:"deber",category:"Sustantivo"},{word:"either",trans:"ya sea",category:"Conjunción"},{word:"fail",trans:"fallar",category:"Verbo"},{word:"health",trans:"salud",category:"Sustantivo"},{word:"influence",trans:"influencia",category:"Sustantivo"},{word:"leader",trans:"líder",category:"Sustantivo"},{word:"measure",trans:"medida",category:"Sustantivo"},{word:"offer",trans:"oferta",category:"Sustantivo"},{word:"pile",trans:"pila",category:"Sustantivo"},{word:"regard",trans:"considerar",category:"Verbo"},{word:"rough",trans:"áspero",category:"Adjetivo"},{word:"series",trans:"serie",category:"Sustantivo"},{word:"spoil",trans:"mimar",category:"Verbo"},{word:"spot",trans:"mancha",category:"Sustantivo"},{word:"thin",trans:"delgado",category:"Adjetivo"},{word:"vote",trans:"votar",category:"Verbo"}
        ];

        let currentIndex = 0;
        let correctCount = 0;
        let totalStudied = 0;
        let isFlipped = false;
        let filteredCards = [...FLASHCARDS];
        let categoryStats = {};
        let progressHistory = [];
        let progressChart = null;

        function init() {
            loadCategories();
            updateCard();
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            initializeChart();
            updateCategoryStats();
        }

        function loadCategories() {
            const categories = [...new Set(FLASHCARDS.map(c => c.category))].sort();
            const container = document.getElementById('categoryFilters');
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                btn.textContent = cat;
                btn.onclick = () => filterCategory(btn, cat);
                container.appendChild(btn);
            });
        }

        function filterCategory(btn, category) {
            btn.classList.toggle('active');
            const active = document.querySelectorAll('.category-btn.active');
            if (active.length === 0) {
                filteredCards = [...FLASHCARDS];
            } else {
                const selected = Array.from(active).map(b => b.textContent);
                filteredCards = FLASHCARDS.filter(c => selected.includes(c.category));
            }
            currentIndex = 0;
            updateCard();
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            if (query === '') {
                filteredCards = [...FLASHCARDS];
            } else {
                filteredCards = FLASHCARDS.filter(c => c.word.includes(query) || c.trans.includes(query));
            }
            currentIndex = 0;
            updateCard();
        }

        function updateCard() {
            if (filteredCards.length === 0) return;
            const card = filteredCards[currentIndex];
            document.getElementById('cardCategory').textContent = card.category;
            document.getElementById('cardWord').textContent = card.word.toUpperCase();
            document.getElementById('cardTranslation').textContent = card.trans;
            isFlipped = false;
            document.getElementById('cardFront').style.display = 'flex';
            document.getElementById('cardBack').style.display = 'none';
            updateProgressText();
            updateNavigation();
            updateProgressBar();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('cardFront').style.display = isFlipped ? 'none' : 'flex';
            document.getElementById('cardBack').style.display = isFlipped ? 'flex' : 'none';
        }

        function markCard(difficulty) {
            if (difficulty === 'good' || difficulty === 'easy') correctCount++;
            totalStudied++;
            const card = filteredCards[currentIndex];
            if (!categoryStats[card.category]) {
                categoryStats[card.category] = { total: 0, correct: 0 };
            }
            categoryStats[card.category].total++;
            if (difficulty === 'good' || difficulty === 'easy') {
                categoryStats[card.category].correct++;
            }
            updateStats();
            updateCategoryStats();
            if (currentIndex < filteredCards.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                showCompletion();
            }
        }

        function previousCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function nextCard() {
            if (currentIndex < filteredCards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function updateStats() {
            const accuracy = totalStudied > 0 ? Math.round((correctCount / totalStudied) * 100) : 0;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('accuracyPercent').textContent = accuracy + '%';
            document.getElementById('sessionCount').textContent = totalStudied;
            document.getElementById('totalWords').textContent = totalStudied;
            document.getElementById('correctWords').textContent = correctCount;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('masteryRate').textContent = Math.round((correctCount / FLASHCARDS.length) * 100) + '%';
            progressHistory.push({time: new Date().getTime(), correct: correctCount, total: totalStudied});
            updateChart();
        }

        function updateCategoryStats() {
            const container = document.getElementById('categoryStats');
            container.innerHTML = '';
            Object.entries(categoryStats).forEach(([cat, stats]) => {
                const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
                const row = document.createElement('div');
                row.className = 'category-row';
                row.innerHTML = `
                    <span class="category-name">${cat}</span>
                    <div class="category-stats">
                        <span>Est: ${stats.total}</span>
                        <span>Cor: ${stats.correct}</span>
                        <span style="color:#667eea;font-weight:700">${accuracy}%</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function updateProgressText() {
            document.getElementById('progressText').textContent = `${currentIndex + 1} de ${filteredCards.length}`;
        }

        function updateProgressBar() {
            const percent = filteredCards.length > 0 ? ((currentIndex + 1) / filteredCards.length) * 100 : 0;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function updateNavigation() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === filteredCards.length - 1;
        }

        function setStudyMode() {
            document.getElementById('studyMode').style.display = 'flex';
            document.getElementById('listMode').style.display = 'none';
        }

        function setListMode() {
            document.getElementById('studyMode').style.display = 'none';
            document.getElementById('listMode').style.display = 'block';
            renderList();
        }

        function renderList() {
            const container = document.getElementById('wordList');
            container.innerHTML = '';
            filteredCards.forEach((card, idx) => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<div><div class="word-name">${card.word}</div><div class="word-trans">${card.trans}</div></div>`;
                item.onclick = () => {
                    currentIndex = idx;
                    setStudyMode();
                    updateCard();
                };
                container.appendChild(item);
            });
        }

        function showCompletion() {
            const accuracy = totalStudied > 0 ? Math.round((correctCount / totalStudied) * 100) : 0;
            alert(`🎉 ¡Sesión completada!\n\n📚 Palabras: ${totalStudied}\n✅ Correctas: ${correctCount}\n🎯 Precisión: ${accuracy}%`);
        }

        function resetProgress() {
            currentIndex = 0;
            correctCount = 0;
            totalStudied = 0;
            isFlipped = false;
            filteredCards = [...FLASHCARDS];
            categoryStats = {};
            progressHistory = [];
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            updateStats();
            updateCard();
            setStudyMode();
        }

        function shuffleCards() {
            for (let i = filteredCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
            }
            currentIndex = 0;
            updateCard();
            alert('✅ Tarjetas mezcladas en orden aleatorio');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'progress') setTimeout(() => updateChart(), 100);
        }

        function initializeChart() {
            const ctx = document.getElementById('progressChart');
            if (!ctx) return;
            progressChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Inicio'],
                    datasets: [{
                        label: 'Progreso de Aprendizaje (%)',
                        data: [0],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true } },
                    scales: { y: { beginAtZero: true, max: 100 } }
                }
            });
        }

        function updateChart() {
            if (!progressChart || progressHistory.length === 0) return;
            progressChart.data.labels = progressHistory.map((_, i) => `${i+1}`);
            progressChart.data.datasets[0].data = progressHistory.map(h => Math.round((h.correct / h.total) * 100));
            progressChart.update();
        }

        window.addEventListener('load', init);
    </script>
</body>
